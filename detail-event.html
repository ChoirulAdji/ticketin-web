<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Event — TicketIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: {
                deep: "#001840",
                mid: "#102A71",
              },
              gold: {
                DEFAULT: "#F5C400",
                light: "#FFDC5F",
                badge: "#FFDF00",
              },
            },
            fontFamily: {
              poppins: ["Poppins", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      * {
        font-family: "Poppins", sans-serif;
      }

      .nav-link {
        position: relative;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 2px;
        background: #f5c400;
        transition: width 0.3s ease;
      }
      .nav-link:hover::after {
        width: 100%;
      }

      #mobile-menu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
      }
      #mobile-menu.open {
        max-height: 300px;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(10px);
      }
    </style>
  </head>
  <body class="bg-gray-50 font-poppins">
    <!-- NAVBAR -->
    <header
      class="fixed top-0 left-0 w-full bg-navy-mid text-white shadow-lg z-50"
    >
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <a href="dashboard.html" class="flex items-center gap-2 group">
          <div
            class="w-8 h-8 bg-gold rounded-lg flex items-center justify-center group-hover:bg-gold-light transition-all duration-300"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5 text-navy-deep"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"
              />
            </svg>
          </div>
          <span class="text-xl font-bold tracking-tight">TicketIn</span>
        </a>

        <nav class="hidden md:flex gap-8">
          <a
            href="dashboard.html"
            class="nav-link hover:text-gold transition-colors duration-200 font-medium"
            >Beranda</a
          >
          <a
            href="tentang.html"
            class="nav-link hover:text-gold transition-colors duration-200 font-medium"
            >Tentang</a
          >
          <a
            href="hubungi.html"
            class="nav-link hover:text-gold transition-colors duration-200 font-medium"
            >Hubungi Kami</a
          >
        </nav>

        <button id="menu-btn" class="md:hidden p-1" aria-label="Menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
      </div>

      <div id="mobile-menu" class="bg-navy-mid border-t border-white/10">
        <nav class="flex flex-col px-6 py-4 gap-3">
          <a
            href="dashboard.html"
            class="hover:text-gold transition font-medium"
            >Beranda</a
          >
          <a href="tentang.html" class="hover:text-gold transition font-medium"
            >Tentang</a
          >
          <a href="hubungi.html" class="hover:text-gold transition font-medium"
            >Hubungi Kami</a
          >
        </nav>
      </div>
    </header>

    <!-- HERO -->
    <section class="pt-[72px] relative">
      <div class="relative h-[420px] md:h-[500px] overflow-hidden">
        <!-- VIDEO -->
        <video
          id="eventVideo"
          class="w-full h-full object-cover hidden"
          autoplay
          muted
          loop
          playsinline
        >
          <source id="eventVideoSource" src="" type="video/mp4" />
          Browser kamu tidak mendukung video.
        </video>

        <!-- IMAGE -->
        <img
          id="eventImage"
          src=""
          alt="Event"
          class="w-full h-full object-cover hidden"
        />

        <!-- OVERLAY -->
        <div
          class="absolute inset-0 bg-gradient-to-r from-navy-deep/90 via-navy-deep/60 to-transparent"
        ></div>

        <div class="absolute inset-0 flex items-end">
          <div class="max-w-7xl mx-auto w-full px-6 pb-12">
            <span
              id="eventCategory"
              class="inline-block bg-gold text-navy-deep text-sm font-bold px-4 py-1 rounded-full mb-4"
            ></span>
            <h1
              id="eventTitle"
              class="text-3xl md:text-5xl font-extrabold text-white mb-4"
            ></h1>
            <div
              class="flex flex-wrap gap-4 text-white/90 text-sm md:text-base"
            >
              <p id="eventDate"></p>
              <p id="eventLocation"></p>
              <p id="eventPrice"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- CONTENT -->
    <main class="max-w-7xl mx-auto px-6 py-12 grid lg:grid-cols-3 gap-10">
      <!-- LEFT -->
      <div class="lg:col-span-2 space-y-8">
        <div class="bg-white rounded-2xl shadow-md p-8">
          <h2 class="text-2xl font-extrabold text-navy-deep mb-4">
            Deskripsi Event
          </h2>
          <p id="eventDescription" class="text-gray-600 leading-relaxed"></p>
        </div>

        <div class="bg-white rounded-2xl shadow-md p-8">
          <h2 class="text-2xl font-extrabold text-navy-deep mb-4">
            Informasi Event
          </h2>
          <div class="grid md:grid-cols-2 gap-4 text-gray-600">
            <div>
              <span class="font-semibold text-navy-deep">Tanggal:</span>
              <span id="infoDate"></span>
            </div>
            <div>
              <span class="font-semibold text-navy-deep">Lokasi:</span>
              <span id="infoLocation"></span>
            </div>
            <div>
              <span class="font-semibold text-navy-deep">Kategori:</span>
              <span id="infoCategory"></span>
            </div>
            <div>
              <span class="font-semibold text-navy-deep">Harga:</span>
              <span id="infoPrice"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div>
        <div class="bg-white rounded-2xl shadow-md p-6 sticky top-24">
          <h3 class="text-xl font-extrabold text-navy-deep mb-4">
            Pesan Tiket
          </h3>
          <p class="text-gray-500 mb-2">Harga mulai dari</p>
          <p
            id="sidePrice"
            class="text-3xl font-extrabold text-navy-mid mb-6"
          ></p>

          <button
            class="w-full bg-gold text-navy-deep py-3 rounded-xl font-bold hover:bg-gold-light transition-all duration-300"
          >
            🎟️ Beli Tiket Sekarang
          </button>

          <a
            href="dashboard.html"
            class="block text-center mt-4 text-navy-mid font-semibold hover:text-gold transition"
          >
            ← Kembali ke Dashboard
          </a>
        </div>
      </div>
    </main>

    <script>
      // Mobile menu
      const menuBtn = document.getElementById("menu-btn");
      const mobileMenu = document.getElementById("mobile-menu");

      menuBtn?.addEventListener("click", () => {
        mobileMenu.classList.toggle("open");
      });

      // Database event sederhana
      const events = {
        titiktemufest: {
          title: "Titik Temu Fest",
          category: "Musik",
          date: "4 April 2026",
          location: "Surabaya",
          price: "Rp50.000",
          video: "video/concert.mp4",
          image: "gambar/titiktemufest.jpg",
          description:
            "Titik Temu Fest adalah festival musik yang menghadirkan berbagai musisi lokal dan nasional dalam satu panggung meriah.",
        },

        techsummit: {
          title: "Origin Fest",
          category: "Musik",
          date: "20 Mei 2026",
          location: "Jakarta",
          price: "Rp75.000",
          video: "video/Origin.mp4",
          description:
            "Origin fest adalah festival musik yang menghadirkan berbagai musisi internasional dan nasional dalam satu panggung megah.",
        },

        designworkshop: {
          title: "Jogjarockarta",
          category: "Musik",
          date: "12 Juni 2026",
          location: "Yogyakarta",
          price: "Rp60.000",
          video: "video/jogja.mp4",
          description:
            "Jogjarockarta adalah festival musik yang menghadirkan berbagai musisi internasional dan nasional dalam satu panggung megah.",
        },

        budayanusantara: {
          title: "Festival Budaya Nusantara",
          category: "Budaya",
          date: "5 Juni 2026",
          location: "Bandung",
          price: "Rp30.000",
          image: "gambar/budaya.jpg",
          description:
            "Festival Budaya Nusantara menghadirkan kekayaan seni dan budaya Indonesia...",
        },

        edmfestival: {
          title: "Electronic Dance Festival",
          category: "Hiburan",
          date: "14 Juni 2026",
          location: "Bali",
          price: "Rp180.000",
          video: "video/edm.mp4",
          image: "gambar/edm.jpg",
          description:
            "Electronic Dance Festival adalah event hiburan malam...",
        },

        weddingexpo: {
          title: "Wedding Expo Indonesia",
          category: "Pameran",
          date: "21 Juni 2026",
          location: "Jakarta",
          price: "Gratis",
          image: "gambar/wedding.jpg",
          description: "Wedding Expo Indonesia adalah pameran pernikahan...",
        },

        comedygala: {
          title: "Stand Up Comedy Gala Night",
          category: "Hiburan",
          date: "28 Juni 2026",
          location: "Surabaya",
          price: "Rp200.000",
          video: "video/comedy.mp4",
          description:
            "Stand Up Comedy Gala Night adalah pertunjukan komedi spesial...",
        },

        surabayamarathon: {
          title: "Surabaya Marathon 2026",
          category: "Olahraga",
          date: "1 Juni 2026",
          location: "Surabaya",
          price: "Rp200.000",
          image: "gambar/marathon.jpg",
          description:
            "Surabaya Marathon 2026 adalah ajang olahraga lari tahunan...",
        },
      };

      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      const event = events[id];

      if (event) {
        document.getElementById("eventTitle").textContent = event.title;
        document.getElementById("eventCategory").textContent = event.category;
        document.getElementById("eventDate").textContent = "📅 " + event.date;
        document.getElementById("eventLocation").textContent =
          "📍 " + event.location;
        document.getElementById("eventPrice").textContent = "🎟️ " + event.price;
        document.getElementById("eventDescription").textContent =
          event.description;
        document.getElementById("infoDate").textContent = event.date;
        document.getElementById("infoLocation").textContent = event.location;
        document.getElementById("infoCategory").textContent = event.category;
        document.getElementById("infoPrice").textContent = event.price;
        document.getElementById("sidePrice").textContent = event.price;
        document.title = event.title + " — TicketIn";

        const videoEl = document.getElementById("eventVideo");
        const videoSource = document.getElementById("eventVideoSource");
        const imageEl = document.getElementById("eventImage");

        // Reset dulu
        videoEl.classList.add("hidden");
        imageEl.classList.add("hidden");

        if (event.video) {
          // Tampilkan video kalau ada
          videoSource.src = event.video;
          videoEl.load();
          videoEl.classList.remove("hidden");
        } else if (event.image) {
          // Kalau tidak ada video, pakai gambar
          imageEl.src = event.image;
          imageEl.classList.remove("hidden");
        } else {
          // Kalau dua-duanya tidak ada
          imageEl.src = "gambar/default-event.jpg";
          imageEl.classList.remove("hidden");
        }
      } else {
        document.getElementById("eventTitle").textContent =
          "Event tidak ditemukan";
        document.getElementById("eventCategory").textContent = "Oops";
        document.getElementById("eventDate").textContent = "";
        document.getElementById("eventLocation").textContent = "";
        document.getElementById("eventPrice").textContent = "";
        document.getElementById("eventDescription").textContent =
          "Maaf, event yang kamu cari tidak tersedia.";

        const videoEl = document.getElementById("eventVideo");
        const imageEl = document.getElementById("eventImage");

        videoEl.classList.add("hidden");
        imageEl.src = "gambar/default-event.jpg";
        imageEl.classList.remove("hidden");
      }
    </script>
  </body>
</html>
